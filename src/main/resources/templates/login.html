<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck Checker Login</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<main class="container narrow">
    <section class="panel">
        <h1>Deck Checker Login</h1>
        <p class="subtitle">Sign in with your DeckPlanet credentials.</p>

        <form method="post" th:action="@{/login}" class="login-form">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="username">

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="current-password">

            <button type="submit">Login</button>
        </form>
    </section>

    <section th:if="${error != null and !#strings.isEmpty(error)}" class="panel error" th:text="${error}"></section>
</main>
</body>
</html>
