spring.application.name=deckchecker

deckchecker.api.base-url=https://api.deckplanet.net/items
deckchecker.api.site-url=https://www.deckplanet.net
deckchecker.api.email=${DECKPLANET_EMAIL:}
deckchecker.api.password=${DECKPLANET_PASSWORD:}
deckchecker.api.cache-dir=.cache
deckchecker.api.cache-ttl-minutes=360
deckchecker.api.force-refresh=false
